# Klonkt — self-host with Docker Compose.
#
#   1. cp .env.example .env     (works as-is: SESSION_SECRET is auto-generated;
#                                optionally set PUBLIC_BASE_URL to your domain so
#                                email/login links are correct)
#   2. docker compose up -d
#   3. open your site and create your admin account at /auth/register
#
# The app listens on port 3000. Put a reverse proxy (Caddy/nginx) in front for
# HTTPS on your domain — see README.
services:
  klonkt:
    build: .
    image: klonkt:latest
    restart: unless-stopped
    env_file: .env
    environment:
      # In de container draait 'ie altijd op 3000 en in productie-modus,
      # ongeacht wat er in .env staat.
      NODE_ENV: production
      PORT: "3000"
    ports:
      # host:container — wijzig de host-poort (links) als 3000 al bezet is.
      - "3000:3000"
    volumes:
      # Alle data (database, geüploade media + audio) blijft hier bewaard.
      - klonkt-data:/app/storage

volumes:
  klonkt-data:
